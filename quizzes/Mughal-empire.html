<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Mughal Empire - Certified PYQs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f1f5f9; }
        .btn-option { transition: all 0.2s; border-width: 2px; }
        .btn-option:active { transform: scale(0.98); }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="app" class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 fade-in relative flex flex-col h-[85vh] md:h-auto md:max-h-[90vh]">
        
        <!-- HEADER -->
        <div id="header" class="bg-white p-4 flex justify-between items-center border-b border-slate-100 shrink-0 hidden">
            <div class="flex flex-col">
                <span class="font-bold text-slate-800 text-sm" id="user-display">Player</span>
                <span class="text-xs text-slate-400" id="mode-display">Rapid Fire</span>
            </div>
            <div id="timer-badge" class="flex items-center gap-1 bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-mono font-bold text-sm">
                ⏱️ <span id="timer">20</span>s
            </div>
        </div>

        <!-- START SCREEN -->
        <div id="start-view" class="h-full overflow-y-auto flex flex-col">
            <div class="p-8 flex flex-col items-center text-center shrink-0">
                <div class="text-5xl mb-4">🕌</div>
                <h1 class="text-2xl font-bold text-slate-800 mb-2">Mughal Empire</h1>
                <p class="text-slate-500 mb-6 text-sm">
                    15 Certified SSC PYQs<br>
                    <span class="text-green-600 font-bold">+1.0</span> • <span class="text-red-500 font-bold">-0.25</span>
                </p>
                <input type="text" id="username" placeholder="Enter Name" class="w-full p-3 border border-slate-300 rounded-xl mb-4 text-center font-bold text-slate-700 outline-none focus:border-blue-500">
                <button onclick="goToModeSelection()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors shadow-lg">
                    Continue
                </button>
            </div>
            <div class="bg-slate-50 border-t border-slate-100 p-4 flex-1">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Leaderboard</h3>
                <div id="start-leaderboard-list" class="space-y-2"></div>
            </div>
        </div>

        <!-- MODE SELECTION -->
        <div id="mode-view" class="h-full overflow-y-auto flex flex-col hidden">
            <div class="p-8 flex flex-col items-center text-center shrink-0">
                <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center">Select Mode</h1>
                <div class="flex flex-col gap-4 w-full">
                    <div onclick="startRapidFire()" class="cursor-pointer p-5 border-2 border-orange-200 bg-orange-50 rounded-xl hover:border-orange-400 text-left">
                        <div class="font-bold text-orange-900">🔥 Rapid Fire</div>
                        <p class="text-xs text-orange-700 mt-1">20s per question. Fast pace.</p>
                    </div>
                    <div onclick="startPractice()" class="cursor-pointer p-5 border-2 border-green-200 bg-green-50 rounded-xl hover:border-green-400 text-left">
                        <div class="font-bold text-green-900">📚 Practice</div>
                        <p class="text-xs text-green-700 mt-1">No timer. Full navigation.</p>
                    </div>
                </div>
                <button onclick="backToStart()" class="mt-6 text-sm text-slate-400 font-bold">← Back</button>
            </div>
        </div>

        <!-- QUIZ VIEW -->
        <div id="quiz-view" class="p-6 hidden flex-col h-full overflow-y-auto">
            <div class="w-full bg-slate-100 h-2 rounded-full mb-6 shrink-0">
                <div id="progress-bar" class="bg-blue-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <div class="mb-6">
                <h2 id="question-text" class="text-lg font-bold text-slate-800 leading-relaxed">Loading...</h2>
                <div id="pyq-tag" class="text-[10px] font-mono text-slate-400 mt-2 bg-slate-50 inline-block px-2 py-0.5 rounded border border-slate-100"></div>
            </div>
            <div id="options-container" class="space-y-3 pb-4 flex-1"></div>
            
            <div id="nav-buttons" class="hidden shrink-0 border-t border-slate-200 pt-4 flex gap-3">
                <button onclick="prevQ()" id="prev-btn" class="flex-1 bg-slate-100 text-slate-600 font-bold py-2 rounded-lg text-sm">← Prev</button>
                <button onclick="submitQuiz()" class="flex-1 bg-green-600 text-white font-bold py-2 rounded-lg text-sm">Submit</button>
                <button onclick="nextQ()" id="next-btn" class="flex-1 bg-blue-600 text-white font-bold py-2 rounded-lg text-sm">Next →</button>
            </div>
        </div>

        <!-- RESULT VIEW -->
        <div id="result-view" class="hidden flex-col h-full overflow-y-auto p-8 text-center">
            <div class="text-6xl mb-4">🏆</div>
            <h2 id="result-name" class="text-xl font-bold text-slate-800 mb-1"></h2>
            <div class="bg-slate-50 rounded-xl p-6 my-6 border border-slate-100">
                <div class="text-[56px] font-black text-blue-600 leading-none mb-4" id="final-score">0</div>
                <div class="flex justify-center gap-6 text-sm font-bold">
                    <span class="text-green-600">✅ <span id="correct-count">0</span></span>
                    <span class="text-red-500">❌ <span id="wrong-count">0</span></span>
                </div>
            </div>
            <button onclick="showReviewFromResults()" class="w-full bg-white border-2 border-slate-200 py-3 rounded-xl font-bold mb-3">Review Solutions</button>
            <button onclick="resetApp()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Back to Home</button>
        </div>

        <!-- REVIEW VIEW -->
        <div id="review-view" class="hidden flex-col h-full bg-slate-50">
            <div class="p-4 bg-white border-b border-slate-200 flex justify-between items-center">
                <h3 class="font-bold">History</h3>
                <button onclick="closeReview()" class="text-blue-600 font-bold text-sm">Close</button>
            </div>
            <div id="review-container" class="flex-1 p-4 overflow-y-auto space-y-4"></div>
        </div>
    </div>

    <script>
        const MASTER_DATA = [
            { q: "Which Mughal Emperor was defeated by Sher Shah Suri in the Battle of Kannauj (1540)?", tag: "SSC CHSL 12/04/2021 (Shift-1)", opts: ["Babur", "Humayun", "Akbar", "Jahangir"], ansText: "Humayun", why: "Humayun fled India after this defeat, leading to the Suri interregnum." },
            { q: "Who was the author of 'Ain-i-Akbari'?", tag: "SSC MTS 05/10/2021 (Shift-2)", opts: ["Badauni", "Abul Fazl", "Faizi", "Gulbadan Begum"], ansText: "Abul Fazl", why: "It is part of the larger work 'Akbarnama'." },
            { q: "The tomb of Itimad-ud-Daulah at Agra was built by:", tag: "SSC CGL 07/03/2020 (Shift-1)", opts: ["Akbar", "Jahangir", "Nur Jahan", "Shah Jahan"], ansText: "Nur Jahan", why: "Constructed for her father; known for first large-scale use of Pietra Dura." },
            { q: "Which Mughal ruler introduced the 'Zabti' system of land revenue?", tag: "SSC CGL 04/06/2019 (Shift-1)", opts: ["Babur", "Akbar", "Shah Jahan", "Aurangzeb"], ansText: "Akbar", why: "Introduced in 1580 with the help of Raja Todar Mal." },
            { q: "Which Sikh Guru was executed by Aurangzeb in 1675?", tag: "SSC CPO 24/11/2020 (Shift-1)", opts: ["Guru Arjan Dev", "Guru Tegh Bahadur", "Guru Gobind Singh", "Guru Angad"], ansText: "Guru Tegh Bahadur", why: "He was the 9th Sikh Guru." },
            { q: "The term 'Mansab' in the Mansabdari system denoted:", tag: "SSC CHSL 14/10/2020 (Shift-3)", opts: ["Land", "Rank", "Cavalry", "Religion"], ansText: "Rank", why: "It determined the holder's position in the administrative hierarchy." },
            { q: "Which Mughal Emperor is known for his 'Chain of Justice'?", tag: "SSC MTS 02/08/2019 (Shift-1)", opts: ["Akbar", "Jahangir", "Shah Jahan", "Humayun"], ansText: "Jahangir", why: "A golden chain with 60 bells linked to the Agra fort." },
            { q: "Which English traveller visited the court of Jahangir?", tag: "SSC CGL 11/04/2022 (Shift-2)", opts: ["William Hawkins", "Ralph Fitch", "Peter Mundy", "John Marshall"], ansText: "William Hawkins", why: "He arrived in 1608 seeking trade concessions." },
            { q: "In which battle did Shah Alam II participate in 1764?", tag: "SSC CGL 21/04/2022 (Shift-3)", opts: ["Plassey", "Buxar", "Panipat III", "Haldighati"], ansText: "Buxar", why: "The joint forces of Mughals, Awadh, and Bengal were defeated." },
            { q: "The 'Moti Masjid' in the Red Fort (Delhi) was built by:", tag: "SSC CGL 13/08/2021 (Shift-2)", opts: ["Shah Jahan", "Jahangir", "Aurangzeb", "Akbar"], ansText: "Aurangzeb", why: "It was added later to the fort for the Emperor's private prayer." },
            { q: "Who translated 'Lilavati' into Persian?", tag: "SSC CGL 16/08/2021 (Shift-3)", opts: ["Abul Fazl", "Faizi", "Dara Shikoh", "Birbal"], ansText: "Faizi", why: "He was Akbar's poet laureate and a prominent scholar." },
            { q: "Which Mughal Emperor was illiterate?", tag: "SSC MTS 08/08/2019 (Shift-2)", opts: ["Babur", "Humayun", "Akbar", "Shah Jahan"], ansText: "Akbar", why: "Despite this, he was a great patron of arts and philosophy." },
            { q: "The 'Peacock Throne' was commissioned by:", tag: "SSC CHSL 19/04/2021 (Shift-1)", opts: ["Shah Jahan", "Jahangir", "Aurangzeb", "Muhammad Shah"], ansText: "Shah Jahan", why: "It was later looted by Nadir Shah in 1739." },
            { q: "In 1582, Akbar founded a new religion called:", tag: "SSC CGL 24/08/2021 (Shift-2)", opts: ["Din-i-Ilahi", "Sulh-i-Kul", "Ibadat Khana", "Mansabdari"], ansText: "Din-i-Ilahi", why: "It was a syncretic code of ethics rather than a formal religion." },
            { q: "Who was the last powerful Mughal Emperor?", tag: "SSC CGL 03/12/2022 (Shift-4)", opts: ["Bahadur Shah I", "Aurangzeb", "Shah Alam II", "Bahadur Shah Zafar"], ansText: "Aurangzeb", why: "The empire began to disintegrate rapidly after his death in 1707." }
        ];

        let activeQ = [], currentIdx = 0, timerId, userAnswers = [], leaderboard = [], mode = "rapid";
        const views = { start: document.getElementById('start-view'), mode: document.getElementById('mode-view'), quiz: document.getElementById('quiz-view'), result: document.getElementById('result-view'), review: document.getElementById('review-view') };

        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

        function goToModeSelection() { 
            if(!document.getElementById('username').value.trim()) return;
            views.start.classList.add('hidden'); views.mode.classList.remove('hidden'); 
        }
        function backToStart() { views.mode.classList.add('hidden'); views.start.classList.remove('hidden'); }
        function startRapidFire() { mode = "rapid"; initQuiz(); }
        function startPractice() { mode = "practice"; initQuiz(); }

        function initQuiz() {
            activeQ = shuffle(JSON.parse(JSON.stringify(MASTER_DATA))).map(q => {
                let s = shuffle([...q.opts]);
                return { ...q, opts: s, ans: s.indexOf(q.ansText) };
            });
            currentIdx = 0; userAnswers = Array(activeQ.length).fill(-1);
            views.mode.classList.add('hidden'); views.quiz.classList.replace('hidden', 'flex');
            document.getElementById('header').classList.remove('hidden');
            document.getElementById('user-display').innerText = document.getElementById('username').value;
            document.getElementById('mode-display').innerText = mode === 'rapid' ? 'Rapid Fire' : 'Practice';
            
            if(mode === 'rapid') {
                document.getElementById('nav-buttons').classList.add('hidden');
                document.getElementById('timer-badge').classList.remove('hidden');
            } else {
                document.getElementById('nav-buttons').classList.remove('hidden');
                document.getElementById('timer-badge').classList.add('hidden');
            }
            renderQ();
        }

        function renderQ() {
            const q = activeQ[currentIdx];
            document.getElementById('question-text').innerText = `Q${currentIdx+1}. ${q.q}`;
            document.getElementById('pyq-tag').innerText = q.tag;
            document.getElementById('progress-bar').style.width = `${((currentIdx+1)/activeQ.length)*100}%`;
            
            const cont = document.getElementById('options-container');
            cont.innerHTML = '';
            q.opts.forEach((o, i) => {
                const btn = document.createElement('button');
                btn.className = `btn-option w-full p-4 rounded-xl text-left border-2 text-sm ${userAnswers[currentIdx] === i ? 'border-blue-500 bg-blue-50 font-bold' : 'border-slate-200 bg-white'}`;
                btn.innerText = o;
                btn.onclick = () => selectOpt(i);
                cont.appendChild(btn);
            });

            if(mode === 'rapid') startTimer();
            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').disabled = currentIdx === activeQ.length - 1;
        }

        function startTimer() {
            clearInterval(timerId); let t = 20;
            const el = document.getElementById('timer'); el.innerText = t;
            timerId = setInterval(() => {
                t--; el.innerText = t;
                if(t <= 0) { clearInterval(timerId); selectOpt(-1); }
            }, 1000);
        }

        function selectOpt(i) {
            userAnswers[currentIdx] = i;
            if(mode === 'rapid') {
                clearInterval(timerId);
                setTimeout(() => {
                    if(currentIdx < activeQ.length - 1) { currentIdx++; renderQ(); }
                    else finish();
                }, 400);
            } else renderQ();
        }

        function prevQ() { if(currentIdx > 0) { currentIdx--; renderQ(); } }
        function nextQ() { if(currentIdx < activeQ.length - 1) { currentIdx++; renderQ(); } }
        function submitQuiz() { if(confirm("Submit Test?")) finish(); }

        function finish() {
            clearInterval(timerId);
            views.quiz.classList.replace('flex', 'hidden'); views.result.classList.replace('hidden', 'flex');
            let m = 0, c = 0, w = 0;
            userAnswers.forEach((a, i) => {
                if(a === activeQ[i].ans) { m += 1; c++; }
                else if(a !== -1) { m -= 0.25; w++; }
            });
            document.getElementById('result-name').innerText = document.getElementById('username').value;
            document.getElementById('final-score').innerText = m.toFixed(2);
            document.getElementById('correct-count').innerText = c;
            document.getElementById('wrong-count').innerText = w;
            leaderboard.push({ name: document.getElementById('username').value, score: m, qSet: activeQ, history: userAnswers });
            updateLeaderboard();
        }

        function updateLeaderboard() {
            leaderboard.sort((a,b) => b.score - a.score);
            const cont = document.getElementById('start-leaderboard-list');
            cont.innerHTML = leaderboard.map((e,i) => `<div class="flex justify-between p-3 bg-white border rounded-lg text-sm"><span>#${i+1} ${e.name}</span><b>${e.score.toFixed(2)}</b></div>`).join('');
        }

        function showReviewFromResults() {
            views.result.classList.replace('flex', 'hidden'); views.review.classList.replace('hidden', 'flex');
            const cont = document.getElementById('review-container'); cont.innerHTML = '';
            activeQ.forEach((q, i) => {
                let h = userAnswers[i];
                let status = h === q.ans ? 'text-green-600' : h === -1 ? 'text-slate-400' : 'text-red-500';
                cont.innerHTML += `<div class="bg-white p-4 rounded-xl border"><div class="text-xs font-bold ${status} mb-1">${h === q.ans ? 'CORRECT' : h === -1 ? 'SKIPPED' : 'WRONG'}</div><p class="text-sm font-bold mb-2">${q.q}</p><div class="text-[10px] text-slate-400 mb-2">${q.tag}</div><div class="space-y-1">${q.opts.map((o, idx) => `<div class="p-2 rounded text-xs border ${idx === q.ans ? 'bg-green-50 border-green-200 font-bold' : idx === h ? 'bg-red-50 border-red-200' : 'border-slate-100'}">${o}</div>`).join('')}</div><div class="mt-2 text-[10px] text-blue-700 italic bg-blue-50 p-2 rounded">💡 ${q.why}</div></div>`;
            });
        }

        function closeReview() { views.review.classList.replace('flex', 'hidden'); views.result.classList.replace('hidden', 'flex'); }
        function resetApp() { views.result.classList.replace('flex', 'hidden'); views.start.classList.remove('hidden'); document.getElementById('header').classList.add('hidden'); }
    </script>
</body>
</html>
```
