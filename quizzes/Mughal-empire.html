<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Mughal Marathon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f1f5f9; }
        .btn-option { transition: all 0.15s ease; border-width: 2px; }
        .btn-option:active { transform: scale(0.99); }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 h-screen overflow-hidden">

    <div id="app" class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 fade-in relative flex flex-col h-[85vh] md:h-[90vh]">
        
        <!-- HEADER -->
        <div id="header" class="bg-white p-4 flex justify-between items-center border-b border-slate-100 shrink-0 hidden">
            <div class="flex flex-col">
                <span class="font-bold text-slate-800 text-sm" id="user-display">Player</span>
                <span class="text-[10px] text-slate-400 font-bold tracking-wider uppercase" id="mode-display">RAPID FIRE</span>
            </div>
            <div id="timer-badge" class="flex items-center gap-1 bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-mono font-bold text-sm">
                ⏱️ <span id="timer">20</span>s
            </div>
        </div>

        <!-- VIEW 1: START SCREEN -->
        <div id="start-view" class="h-full overflow-hidden flex flex-col">
            <div class="p-8 flex flex-col items-center text-center shrink-0 overflow-y-auto">
                <div class="text-5xl mb-4">🕌</div>
                <h1 class="text-2xl font-bold text-slate-800 mb-2">Mughal Empire</h1>
                <p class="text-slate-500 mb-6 text-sm">
                    200Qs Marathon<br>
                    <span class="text-green-600 font-bold">+1.0</span> • <span class="text-red-500 font-bold">-0.25</span>
                </p>
                <input type="text" id="username" placeholder="Enter Name" class="w-full p-3 border border-slate-300 rounded-xl mb-4 text-center font-bold text-slate-700 outline-none focus:border-blue-500 bg-slate-50 focus:bg-white transition-colors">
                <button onclick="goToModeSelection()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors shadow-lg shadow-blue-200 mb-8">Continue</button>
            </div>
            <div class="bg-slate-50 border-t border-slate-100 p-4 flex-1 overflow-y-auto min-h-0">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Leaderboard</h3>
                    <button onclick="clearLeaderboard()" class="text-[10px] text-red-400 hover:text-red-600 font-bold">CLEAR HISTORY</button>
                </div>
                <div id="start-leaderboard-list" class="space-y-2 pb-4">
                    <p class="text-center text-slate-400 text-sm italic mt-4">No attempts yet.</p>
                </div>
            </div>
        </div>

        <!-- VIEW 2: MODE SELECTION -->
        <div id="mode-view" class="h-full overflow-y-auto flex flex-col hidden">
            <div class="p-8 flex flex-col items-center text-center shrink-0">
                <h1 class="text-2xl font-bold text-slate-800 mb-6">Select Mode</h1>
                <div class="flex flex-col gap-4 w-full">
                    <div onclick="startRapidFire()" class="cursor-pointer group p-5 border-2 border-orange-200 bg-orange-50 rounded-xl hover:border-orange-400 hover:shadow-md transition-all text-left">
                        <div class="font-bold text-orange-900 flex items-center gap-2">🔥 Rapid Fire</div>
                        <p class="text-xs text-orange-700 mt-1 font-medium">20s Timer • Auto-Skip</p>
                    </div>
                    <div onclick="startPractice()" class="cursor-pointer group p-5 border-2 border-green-200 bg-green-50 rounded-xl hover:border-green-400 hover:shadow-md transition-all text-left">
                        <div class="font-bold text-green-900 flex items-center gap-2">📚 Practice Mode</div>
                        <p class="text-xs text-green-700 mt-1 font-medium">No Timer • Navigation</p>
                    </div>
                </div>
                <button onclick="backToStart()" class="mt-8 text-slate-400 hover:text-slate-600 font-bold text-sm">← Back</button>
            </div>
        </div>

        <!-- VIEW 3: QUIZ -->
        <div id="quiz-view" class="p-6 hidden flex-col h-full overflow-y-auto">
            <div class="w-full bg-slate-100 h-1.5 rounded-full mb-6 shrink-0 overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <div class="mb-6 shrink-0">
                <h2 id="question-text" class="text-lg font-bold text-slate-800 leading-relaxed">Loading...</h2>
                <div id="pyq-tag" class="inline-block mt-2 px-2 py-0.5 bg-slate-100 border border-slate-200 rounded text-[10px] font-mono text-slate-500 font-medium"></div>
            </div>
            <div id="options-container" class="space-y-3 pb-4 flex-1"></div>
            <div id="nav-buttons" class="hidden shrink-0 border-t border-slate-100 pt-4 mt-2 flex gap-3">
                <button onclick="prevQ()" id="prev-btn" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl text-sm transition-colors disabled:opacity-50">← Prev</button>
                <button onclick="submitQuiz()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl text-sm transition-colors shadow-sm">Submit</button>
                <button onclick="nextQ()" id="next-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-sm transition-colors disabled:opacity-50 shadow-sm">Next →</button>
            </div>
            <div id="question-indicator" class="hidden shrink-0 text-center text-[10px] text-slate-400 font-bold mt-3">
                <span id="current-q-num">1</span> / <span id="total-q-num">50</span>
            </div>
        </div>

        <!-- VIEW 4: RESULT -->
        <div id="result-view" class="hidden flex-col h-full overflow-y-auto">
            <div class="p-8 text-center shrink-0">
                <div class="text-6xl mb-4 animate-bounce">🏆</div>
                <h2 class="text-xl font-bold text-slate-800 mb-1">Test Completed</h2>
                <p class="text-slate-500 text-sm mb-6 font-medium" id="result-name">Well done</p>
                <div class="bg-slate-50 rounded-2xl p-6 mb-6 border border-slate-200">
                    <div class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-2">FINAL SCORE</div>
                    <div id="final-score" class="text-6xl font-black text-blue-600 leading-none mb-4 tracking-tight">0</div>
                    <div class="flex justify-center gap-6 text-sm font-bold border-t border-slate-200 pt-4">
                        <span class="text-green-600 flex items-center gap-1">✅ <span id="correct-count">0</span></span>
                        <span class="text-red-500 flex items-center gap-1">❌ <span id="wrong-count">0</span></span>
                        <span class="text-slate-400 flex items-center gap-1">⚪ <span id="skip-count">0</span></span>
                    </div>
                </div>
                <div class="space-y-3">
                    <button onclick="showReviewFromResults()" class="w-full bg-white border-2 border-slate-200 hover:bg-slate-50 text-slate-700 font-bold py-3.5 rounded-xl transition-colors text-sm">📄 Review Solutions</button>
                    <button onclick="resetApp()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-colors text-sm shadow-md shadow-blue-200">🔄 Back to Home</button>
                </div>
            </div>
        </div>

        <!-- VIEW 5: REVIEW HISTORY -->
        <div id="review-view" class="hidden flex-col h-full bg-slate-50">
            <div class="p-4 bg-white border-b border-slate-200 flex justify-between items-center shrink-0 shadow-sm z-10">
                <h3 class="font-bold text-slate-700 text-sm">History: <span id="review-player-name" class="text-blue-600"></span></h3>
                <button onclick="closeReview()" class="text-blue-600 font-bold text-xs hover:underline bg-blue-50 px-3 py-1 rounded-full">CLOSE</button>
            </div>
            <div id="review-container" class="flex-1 p-4 overflow-y-auto min-h-0 space-y-4"></div>
        </div>
    </div>

    <script>
        const MASTER_DATA = [
            // EARLY MUGHALS
            { q: "In the Battle of Khanwa (1527), Babur assumed which title after his victory over Rana Sanga?", tag: "SSC CPO 2020", opts: ["Ghazi", "Qalandar", "Chhatrapati", "Sultan-i-Azam"], ansText: "Ghazi", why: "Babur declared the war a 'Jihad' and assumed the title 'Ghazi' (Slayer of Infidels) to boost the morale of his soldiers against the Rajput confederacy." },
            { q: "Which Mughal Emperor wrote his autobiography in Chagatai Turkic, which was later translated into Persian by Abdul Rahim Khan-i-Khana?", tag: "SSC CGL 2021", opts: ["Akbar", "Babur", "Humayun", "Jahangir"], ansText: "Babur", why: "'Tuzuk-i-Baburi' (Baburnama) is considered one of the finest autobiographies. Jahangir also wrote his autobiography but in Persian." },
            { q: "Who defeated Humayun in the Battle of Chausa (1539) and Kannauj (1540), forcing him into exile?", tag: "SSC CHSL 2019", opts: ["Sher Shah Suri", "Bahadur Shah of Gujarat", "Islam Shah", "Rana Sanga"], ansText: "Sher Shah Suri", why: "Sher Khan (Sher Shah) destroyed Mughal power temporarily. Humayun fled to Iran and only returned in 1555." },
            { q: "The 'Second Battle of Panipat' (1556) was fought between the forces of Akbar (led by Bairam Khan) and:", tag: "SSC MTS 2021", opts: ["Hemu", "Sher Shah Suri", "Sikandar Suri", "Rana Pratap"], ansText: "Hemu", why: "Hemu (Hemchandra Vikramaditya) had captured Delhi. His defeat and execution marked the real beginning of Akbar's reign." },
            
            // AKBAR (ADMIN & POLICIES)
            { q: "Which statement is NOT correct regarding the Mansabdari System?", tag: "SSC CGL Mains", opts: ["It was hereditary", "It had two ranks: Zat and Sawar", "Mansabdars were paid in cash or Jagir", "Introduced by Akbar"], ansText: "It was hereditary", why: "Mansabdari was NOT hereditary. The King appointed Mansabdars, and their property could be escheated (confiscated) by the state upon death." },
            { q: "The 'Ibadat Khana' at Fatehpur Sikri was established by Akbar in 1575 for the purpose of:", tag: "SSC CGL 2022", opts: ["Royal Treasury", "Religious Debates", "Military Planning", "Harem"], ansText: "Religious Debates", why: "Initially only for Muslims, it was later opened to Hindus, Jains, Christians, and Zoroastrians, leading to the development of 'Sulh-i-Kul'." },
            { q: "Who translated the 'Mahabharata' into Persian as 'Razmnama' (Book of War)?", tag: "SSC CGL 2020", opts: ["Abul Fazl", "Badauni", "Faizi", "Todar Mal"], ansText: "Badauni", why: "A team of scholars including Badauni, Naqib Khan, and Faizi translated it. Badauni did it reluctantly as he was an orthodox Muslim." },
            { q: "Which Mughal Emperor abolished the 'Pilgrimage Tax' (1563) and 'Jizya' (1564)?", tag: "SSC CHSL 2021", opts: ["Akbar", "Shah Jahan", "Jahangir", "Aurangzeb"], ansText: "Akbar", why: "These steps were foundational to his policy of religious tolerance and winning Rajput loyalty." },
            { q: "The land revenue system 'Zabti' or 'Bandobast' was associated with which minister?", tag: "SSC CPO 2019", opts: ["Raja Todar Mal", "Birbal", "Man Singh", "Tansen"], ansText: "Raja Todar Mal", why: "Todar Mal (Finance Minister) implemented the system based on survey and measurement. It is often called 'Todar Mal's Bandobast'." },
            
            // JAHANGIR & SHAH JAHAN
            { q: "Which English ambassador obtained the 'Farman' to establish a factory at Surat from Jahangir in 1615?", tag: "SSC CGL 2022", opts: ["Sir Thomas Roe", "Captain William Hawkins", "Ralph Fitch", "Job Charnock"], ansText: "Sir Thomas Roe", why: "Hawkins arrived earlier (1608) but failed to get a firm treaty. Sir Thomas Roe, sent by James I, succeeded in getting trading rights." },
            { q: "Who was given the title 'Nadir-ul-Asr' (Wonder of the Age) by Jahangir for his mastery in painting birds and animals?", tag: "SSC Selection Post", opts: ["Ustad Mansur", "Abul Hasan", "Bishandas", "Daswant"], ansText: "Ustad Mansur", why: "Mansur was famous for his detailed studies of nature, including the famous Dodo bird and Siberian Crane." },
            { q: "Which Mughal prince translated the Upanishads into Persian as 'Sirr-i-Akbar'?", tag: "SSC JE 2020", opts: ["Dara Shikoh", "Murad Baksh", "Shah Shuja", "Aurangzeb"], ansText: "Dara Shikoh", why: "Dara Shikoh believed the Upanishads were the 'Kitab al-Maknun' (Hidden Book) mentioned in the Quran." },
            { q: "The 'Peacock Throne' (Takht-i-Taus) was kept in which building of the Red Fort?", tag: "SSC CGL 2019", opts: ["Diwan-i-Khas", "Diwan-i-Aam", "Rang Mahal", "Moti Masjid"], ansText: "Diwan-i-Khas", why: "It was placed in the Hall of Private Audience. Nadir Shah looted it in 1739." },
            
            // AURANGZEB
            { q: "Which Mughal Emperor re-imposed Jizya in 1679?", tag: "SSC MTS 2019", opts: ["Aurangzeb", "Shah Jahan", "Jahangir", "Bahadur Shah I"], ansText: "Aurangzeb", why: "Aurangzeb reversed Akbar's policy and re-imposed Jizya on non-Muslims to align the state with orthodox Sharia law." },
            { q: "The 'Biwi ka Maqbara' at Aurangabad is a replica of the Taj Mahal. It was built by:", tag: "SSC CGL 2021", opts: ["Azam Shah", "Aurangzeb", "Akbar II", "Shah Alam II"], ansText: "Azam Shah", why: "Built by Prince Azam Shah in memory of his mother Dilras Banu Begum (Rabia-ud-Daurani), wife of Aurangzeb." },
            { q: "Which Sikh Guru was executed by Aurangzeb in 1675 at Chandni Chowk?", tag: "SSC CGL 2020", opts: ["Guru Tegh Bahadur", "Guru Gobind Singh", "Guru Arjan Dev", "Guru Hargobind"], ansText: "Guru Tegh Bahadur", why: "He was martyred for protecting the rights of Kashmiri Brahmins. Gurudwara Sis Ganj Sahib marks the spot." },
            
            // LATER MUGHALS & DECLINE
            { q: "Who was the Mughal Emperor during the invasion of Nadir Shah (1739)?", tag: "SSC CGL 2022", opts: ["Muhammad Shah", "Shah Alam II", "Farrukhsiyar", "Jahandar Shah"], ansText: "Muhammad Shah", why: "Muhammad Shah 'Rangeela' was defeated at the Battle of Karnal. Nadir Shah took the Peacock Throne and Kohinoor." },
            { q: "Which Mughal Emperor gave the title of 'Raja' to Ram Mohan Roy?", tag: "SSC CHSL 2020", opts: ["Akbar II", "Bahadur Shah Zafar", "Shah Alam II", "Alamgir II"], ansText: "Akbar II", why: "Akbar II sent Ram Mohan Roy to England to plead for an increase in the Emperor's pension." },
            { q: "The 'Battle of Buxar' (1764) was fought during the reign of which Mughal Emperor?", tag: "SSC CGL 2019", opts: ["Shah Alam II", "Alamgir II", "Akbar II", "Bahadur Shah Zafar"], ansText: "Shah Alam II", why: "Shah Alam II, along with Shuja-ud-Daula (Awadh) and Mir Qasim (Bengal), was defeated by the British (Hector Munro)." },
            
            // ADMINISTRATION & TERMS
            { q: "In Mughal administration, 'Muhtasib' was the officer in charge of:", tag: "SSC CGL Tier-2", opts: ["Public Morals", "Military Pay", "Royal Household", "Intelligence"], ansText: "Public Morals", why: "Muhtasibs enforced Islamic moral codes and checked weights and measures in markets." },
            { q: "The term 'Khalisa' in Mughal land revenue system referred to:", tag: "SSC CPO 2021", opts: ["Crown Lands", "Land given to nobles", "Religious grants", "Barren land"], ansText: "Crown Lands", why: "Revenue from Khalisa land went directly to the Royal Treasury, unlike Jagir lands assigned to officers." },
            { q: "What was 'Dam' in the Mughal currency system?", tag: "SSC MTS 2021", opts: ["Copper Coin", "Silver Coin", "Gold Coin", "Revenue Unit"], ansText: "Copper Coin", why: "40 Dams equalled 1 Silver Rupee. It was the common currency for the masses." },
            
            // STATEMENT BASED (NEW PATTERN)
            { q: "Which of the following statements about the 'Jagirdari Crisis' is correct?", tag: "SSC Conceptual", opts: ["Shortage of Paibaqi land", "Excess of Jagirs", "Decrease in Mansabdars", "None of these"], ansText: "Shortage of Paibaqi land", why: "In the late 17th century, there were too many Mansabdars waiting for Jagirs, but insufficient 'Paibaqi' (assignable land) available, causing a crisis." },
            { q: "Consider the following about Sher Shah Suri: 1. He introduced the Rupee. 2. He built the Grand Trunk Road. Which is correct?", tag: "SSC CGL 2023 Pattern", opts: ["Both 1 and 2", "Only 1", "Only 2", "Neither 1 nor 2"], ansText: "Both 1 and 2", why: "Sher Shah introduced the silver 'Rupaiya' (178 grains) and restored the Sadak-e-Azam (GT Road) from Sonargaon to Peshawar." },
            
            // ART & CULTURE
            { q: "Which style of painting was introduced by the Mughals?", tag: "SSC CHSL 2020", opts: ["Miniature", "Mural", "Fresco", "Oil Painting"], ansText: "Miniature", why: "Mughal painting is a distinct style of South Asian miniature painting, blending Persian and Indian influences." },
            { q: "The 'Buland Darwaza' was built to commemorate Akbar's victory over:", tag: "SSC CGL 2018", opts: ["Gujarat", "Bengal", "Kashmir", "Deccan"], ansText: "Gujarat", why: "Built in 1602 AD at Fatehpur Sikri, it is the highest gateway in the world, marking the Gujarat conquest (1572-73)." },
            { q: "Who built the Red Fort in Delhi?", tag: "SSC MTS 2019", opts: ["Shah Jahan", "Akbar", "Aurangzeb", "Jahangir"], ansText: "Shah Jahan", why: "He shifted the capital from Agra to Delhi (Shahjahanabad) and built the Red Fort (Lal Qila) between 1638-1648." },
            
            // TOUGH/OBSCURE
            { q: "Who was the only Mughal Emperor to have written a will partitioning the empire among his sons?", tag: "SSC CGL Tier-1", opts: ["Babur", "Humayun", "Aurangzeb", "Shah Jahan"], ansText: "Aurangzeb", why: "Aurangzeb left a will attempting to divide the empire to prevent a war of succession, but his sons fought anyway." },
            { q: "Which Mughal Emperor was known as 'Rangeela'?", tag: "SSC CHSL 2021", opts: ["Muhammad Shah", "Farrukhsiyar", "Jahandar Shah", "Ahmad Shah"], ansText: "Muhammad Shah", why: "Muhammad Shah (1719-1748) was called 'Rangeela' due to his indulgence in luxury and arts while the empire crumbled." },
            { q: "The practice of 'Jharokha Darshan' was introduced by Akbar but abolished by:", tag: "SSC CGL 2022", opts: ["Aurangzeb", "Shah Jahan", "Jahangir", "Bahadur Shah I"], ansText: "Aurangzeb", why: "Aurangzeb considered it un-Islamic (personality worship) and discontinued it in his 11th regnal year." },
            
            // BATTLES & TREATIES
            { q: "The Treaty of Purandar (1665) was signed between Shivaji and:", tag: "SSC CGL 2020", opts: ["Raja Jai Singh", "Aurangzeb", "Shaista Khan", "Afzal Khan"], ansText: "Raja Jai Singh", why: "Jai Singh I of Amber represented Aurangzeb. Shivaji surrendered 23 forts and agreed to visit the Mughal court." },
            { q: "The Battle of Haldighati (1576) was fought between the Mughals and:", tag: "SSC CGL 2019", opts: ["Maharana Pratap", "Rana Sanga", "Prithviraj Chauhan", "Rana Kumbha"], ansText: "Maharana Pratap", why: "Man Singh I led the Mughal forces. Though Pratap lost the field, he continued guerrilla warfare." },
            { q: "Who issued a 'Mahzarnama' in 1579?", tag: "SSC CPO 2020", opts: ["Akbar", "Aurangzeb", "Shah Jahan", "Jahangir"], ansText: "Akbar", why: "Drafted by Faizi and Abul Fazl's father Mubarak, it declared Akbar as the supreme arbiter in religious matters (Imam-i-Adil)." },
            { q: "The first English factory in Mughal India was established at:", tag: "SSC MTS 2021", opts: ["Surat", "Masulipatnam", "Bombay", "Calcutta"], ansText: "Surat", why: "Established in 1613 after Jahangir issued a Farman to Captain Thomas Best following the naval Battle of Swally." },
            
            // LITERATURE
            { q: "Who translated 'Panchatantra' into Persian as 'Anwar-i-Suhaili'?", tag: "SSC CHSL 2018", opts: ["Husain ibn Ali Waiz", "Abul Fazl", "Faizi", "Badayuni"], ansText: "Husain ibn Ali Waiz", why: "Another version 'Iyar-i-Danish' was written by Abul Fazl. It is a collection of fables." },
            { q: "The 'Padshahnama' is a chronicle of the reign of:", tag: "SSC CGL 2022", opts: ["Shah Jahan", "Akbar", "Aurangzeb", "Humayun"], ansText: "Shah Jahan", why: "Written by Abdul Hamid Lahori, it is the official history of Shah Jahan's reign." },
            
            // MISCELLANEOUS
            { q: "Which crop was introduced in India during the Mughal period by the Portuguese?", tag: "SSC CGL 2021", opts: ["Tobacco", "Rice", "Wheat", "Barley"], ansText: "Tobacco", why: "Tobacco, potato, maize, and chili were introduced in the 16th/17th century. Jahangir initially tried to ban tobacco." },
            { q: "The concept of 'Sulh-i-Kul' implies:", tag: "SSC CGL 2020", opts: ["Universal Peace", "Holy War", "Divine Right", "Taxation"], ansText: "Universal Peace", why: "It was Akbar's policy of absolute peace and non-discrimination between religions." },
            { q: "Who was the revenue minister of Sher Shah Suri?", tag: "SSC CGL 2019", opts: ["Todar Mal", "Raja Ram", "Brahmajit Gaur", "None"], ansText: "Todar Mal", why: "Todar Mal learned his revenue expertise under Sher Shah before serving Akbar." },
            { q: "Which Mughal Emperor had the longest reign?", tag: "SSC MTS 2022", opts: ["Aurangzeb", "Akbar", "Shah Jahan", "Jahangir"], ansText: "Aurangzeb", why: "Both Akbar and Aurangzeb ruled for approx 49-50 years, but Aurangzeb is often cited as slightly longer or equal." },
            { q: "The city of 'Dinpanah' was built by:", tag: "SSC CHSL 2020", opts: ["Humayun", "Sher Shah", "Akbar", "Babur"], ansText: "Humayun", why: "Humayun built it in Delhi. Sher Shah destroyed it to build Shergarh (Purana Qila)." },
            { q: "Who was the guardian/regent of Akbar during his early years?", tag: "SSC CGL 2018", opts: ["Bairam Khan", "Adham Khan", "Munim Khan", "Maham Anga"], ansText: "Bairam Khan", why: "He led the Mughal forces in the Second Battle of Panipat and managed the empire until 1560." },
            { q: "Which Mughal princess wrote the biography of her father?", tag: "SSC CGL 2017", opts: ["Jahanara", "Zeb-un-Nisa", "Gulbadan Begum", "None"], ansText: "None", why: "Trick question. Gulbadan wrote about her BROTHER (Humayun). Jahanara wrote a biography of Moinuddin Chishti." },
            { q: "The 'Tomb of Sher Shah' is located at:", tag: "SSC CPO 2019", opts: ["Sasaram", "Delhi", "Kalinjar", "Patna"], ansText: "Sasaram", why: "It is a masterpiece of Indo-Islamic architecture, standing in the middle of a lake in Bihar." },
            { q: "Who assumed the title of 'Alamgir'?", tag: "SSC CGL 2021", opts: ["Aurangzeb", "Shah Jahan", "Akbar", "Jahangir"], ansText: "Aurangzeb", why: "He adopted the title 'Alamgir' (Conqueror of the World) upon ascending the throne." },
            { q: "The 'Daswant' and 'Basawan' were famous painters in the court of:", tag: "SSC CGL 2020", opts: ["Akbar", "Jahangir", "Shah Jahan", "Humayun"], ansText: "Akbar", why: "They illustrated the Razmnama and other manuscripts." },
            { q: "Which Mughal Emperor shifted the capital from Agra to Delhi (Shahjahanabad)?", tag: "SSC CGL 2019", opts: ["Shah Jahan", "Akbar", "Aurangzeb", "Jahangir"], ansText: "Shah Jahan", why: "He built the Red Fort and Jama Masjid there in 1638." },

        ansText: "Nizam-ul-Mulk",
        why: "Chin Qilich Khan (Asaf Jah I)."
    },
    {
        q: "Which Mughal Emperor was called 'Khurram' in his childhood?",
        tag: "SSC GD 2021",
        opts: ["Shah Jahan", "Jahangir", "Akbar", "Aurangzeb"],
        ansText: "Shah Jahan",
        why: "Name given by his grandfather Akbar."
    }
        ];

        let activeQ = [], currentIdx = 0, timerId, userAnswers = [], leaderboard = [], mode = "rapid", userName = "";
        let previousView = null;

        const views = { start: document.getElementById('start-view'), mode: document.getElementById('mode-view'), quiz: document.getElementById('quiz-view'), result: document.getElementById('result-view'), review: document.getElementById('review-view') };

        // --- LOCAL STORAGE LOGIC ---
        function loadLeaderboard() {
            const data = localStorage.getItem('ssc_mughal_marathon_lb');
            if (data) leaderboard = JSON.parse(data);
            updateLeaderboardUI();
        }
        function saveLeaderboard() {
            localStorage.setItem('ssc_mughal_marathon_lb', JSON.stringify(leaderboard));
        }
        function clearLeaderboard() {
            if(confirm("Clear history?")) {
                leaderboard = [];
                saveLeaderboard();
                updateLeaderboardUI();
            }
        }
        window.onload = loadLeaderboard;

        // --- NAVIGATION ---
        function goToModeSelection() {
            userName = document.getElementById('username').value.trim();
            if (!userName) return alert("Please enter your name");
            views.start.classList.add('hidden');
            views.mode.classList.remove('hidden');
        }
        function backToStart() { views.mode.classList.add('hidden'); views.start.classList.remove('hidden'); }
        
        function startRapidFire() { mode = "rapid"; initQuiz(); }
        function startPractice() { mode = "practice"; initQuiz(); }

        // --- QUIZ LOGIC ---
        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

        function initQuiz() {
            // Shuffle Logic
            activeQ = shuffle(JSON.parse(JSON.stringify(MASTER_DATA))).map(q => {
                let s = shuffle([...q.opts]);
                return { ...q, opts: s, ans: s.indexOf(q.ansText) };
            });
            
            currentIdx = 0; 
            userAnswers = Array(activeQ.length).fill(-1);
            
            // UI Switch
            views.mode.classList.add('hidden'); 
            views.quiz.classList.replace('hidden', 'flex');
            document.getElementById('header').classList.remove('hidden');
            
            document.getElementById('user-display').innerText = userName;
            document.getElementById('mode-display').innerText = mode === 'rapid' ? 'RAPID FIRE' : 'PRACTICE';
            
            if(mode === 'rapid') {
                document.getElementById('nav-buttons').classList.add('hidden');
                document.getElementById('question-indicator').classList.add('hidden');
                document.getElementById('timer-badge').classList.remove('hidden');
            } else {
                document.getElementById('nav-buttons').classList.remove('hidden');
                document.getElementById('question-indicator').classList.remove('hidden');
                document.getElementById('timer-badge').classList.add('hidden');
                document.getElementById('current-q-num').innerText = 1;
                document.getElementById('total-q-num').innerText = activeQ.length;
            }
            
            renderQ();
        }

        function renderQ() {
            const q = activeQ[currentIdx];
            document.getElementById('question-text').innerText = `Q${currentIdx+1}. ${q.q}`;
            document.getElementById('pyq-tag').innerText = q.tag;
            document.getElementById('progress-bar').style.width = `${((currentIdx+1)/activeQ.length)*100}%`;
            
            if(mode === 'practice') document.getElementById('current-q-num').innerText = currentIdx + 1;

            const cont = document.getElementById('options-container');
            cont.innerHTML = '';
            
            q.opts.forEach((o, i) => {
                const btn = document.createElement('button');
                let sel = userAnswers[currentIdx] === i;
                btn.className = `btn-option w-full p-4 rounded-xl text-left text-sm font-medium border-slate-200 bg-white text-slate-700 hover:border-blue-300 hover:bg-blue-50`;
                
                if (sel) {
                    btn.className = `btn-option w-full p-4 rounded-xl text-left text-sm font-bold border-blue-500 bg-blue-50 text-blue-800 shadow-sm ring-1 ring-blue-500`;
                }

                btn.innerText = o;
                btn.onclick = () => handleSelect(i);
                cont.appendChild(btn);
            });

            if(mode === 'practice') {
                document.getElementById('prev-btn').disabled = currentIdx === 0;
                document.getElementById('next-btn').disabled = currentIdx === activeQ.length - 1;
            } else {
                startTimer();
            }
        }

        function handleSelect(i) {
            userAnswers[currentIdx] = i;
            renderQ();

            if (mode === 'rapid') {
                clearInterval(timerId);
                setTimeout(() => {
                    if (currentIdx < activeQ.length - 1) { currentIdx++; renderQ(); } 
                    else finish();
                }, 400);
            } else {
                setTimeout(() => {
                    if (currentIdx < activeQ.length - 1) { currentIdx++; renderQ(); }
                }, 400);
            }
        }

        function startTimer() {
            clearInterval(timerId); 
            let t = 20;
            const el = document.getElementById('timer'); 
            el.innerText = t;
            
            timerId = setInterval(() => {
                t--; 
                el.innerText = t;
                if(t <= 0) { 
                    clearInterval(timerId); 
                    if(userAnswers[currentIdx] === -1) handleSelect(-1); 
                }
            }, 1000);
        }

        function prevQ() { if(currentIdx > 0) { currentIdx--; renderQ(); } }
        function nextQ() { if(currentIdx < activeQ.length - 1) { currentIdx++; renderQ(); } }
        function submitQuiz() { if(confirm("Submit Test?")) finish(); }

        function finish() {
            clearInterval(timerId);
            views.quiz.classList.replace('flex', 'hidden'); 
            views.result.classList.replace('hidden', 'flex');
            document.getElementById('header').classList.add('hidden');

            let m = 0, c = 0, w = 0, s = 0;
            userAnswers.forEach((a, i) => {
                if (a === activeQ[i].ans) { m += 1; c++; }
                else if (a === -1) { s++; }
                else { m -= 0.25; w++; }
            });

            document.getElementById('result-name').innerText = userName;
            document.getElementById('final-score').innerText = m.toFixed(2);
            document.getElementById('correct-count').innerText = c;
            document.getElementById('wrong-count').innerText = w;
            document.getElementById('skip-count').innerText = s;

            leaderboard.push({
                name: userName,
                score: m,
                date: new Date().toLocaleDateString('en-GB', {day: 'numeric', month: 'short'}),
                mode: mode,
                qSet: activeQ, 
                history: userAnswers
            });
            saveLeaderboard();
            updateLeaderboardUI();
        }

        // --- RANKING LOGIC (DENSE RANK) ---
        function updateLeaderboardUI() {
            leaderboard.sort((a,b) => b.score - a.score);
            const list = document.getElementById('start-leaderboard-list');
            
            if (leaderboard.length === 0) {
                list.innerHTML = '<p class="text-center text-slate-400 text-sm italic mt-4">No attempts yet.</p>';
                return;
            }

            let currentRank = 1;
            
            list.innerHTML = leaderboard.map((e, i) => {
                // Dense Rank Logic
                if (i > 0 && e.score < leaderboard[i-1].score) {
                    currentRank = currentRank + 1; // Increment only if score is strictly lower
                }
                // If score is same, currentRank remains same
                
                let icon = e.mode === 'rapid' ? '🔥' : '📚';
                let medal = currentRank === 1 ? '🥇' : currentRank === 2 ? '🥈' : currentRank === 3 ? '🥉' : `<span class="text-slate-400 font-bold text-sm">#${currentRank}</span>`;

                return `
                <div onclick="viewHistory(${i})" class="flex items-center justify-between p-3 bg-white border border-slate-200 rounded-xl shadow-sm cursor-pointer hover:bg-blue-50 transition-colors group">
                    <div class="flex items-center gap-3">
                        <div class="w-8 flex justify-center text-xl">${medal}</div>
                        <div>
                            <div class="font-bold text-slate-700 text-sm group-hover:text-blue-700">${e.name}</div>
                            <div class="text-[10px] text-slate-400 font-medium flex items-center gap-1">
                                <span>${icon}</span> ${e.date}
                            </div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-black text-slate-800 text-sm">${e.score.toFixed(2)}</div>
                        <div class="text-[9px] text-blue-500 font-bold opacity-0 group-hover:opacity-100 transition-opacity">VIEW</div>
                    </div>
                </div>`;
            }).join('');
        }

        function viewHistory(idx) {
            previousView = views.start;
            views.start.classList.add('hidden');
            renderReview(leaderboard[idx].history, leaderboard[idx].qSet, leaderboard[idx].name);
        }

        function showReviewFromResults() {
            previousView = views.result;
            views.result.classList.replace('flex', 'hidden');
            renderReview(userAnswers, activeQ, userName);
        }

        function renderReview(answers, qData, pName) {
            views.review.classList.replace('hidden', 'flex');
            document.getElementById('review-player-name').innerText = pName; 
            const cont = document.getElementById('review-container');
            cont.innerHTML = '';

            answers.forEach((ansIdx, i) => {
                const q = qData[i];
                let statusClass = ansIdx === q.ans ? 'text-green-600 bg-green-50 border-green-100' : ansIdx === -1 ? 'text-slate-500 bg-slate-50 border-slate-100' : 'text-red-500 bg-red-50 border-red-100';
                let statusText = ansIdx === q.ans ? 'CORRECT (+1)' : ansIdx === -1 ? 'SKIPPED' : 'WRONG (-0.25)';

                let optsHtml = q.opts.map((o, idx) => {
                    let style = "border-slate-100 text-slate-500";
                    let icon = "";
                    if (idx === q.ans) { style = "bg-green-50 border-green-200 text-green-800 font-bold"; icon = "✅"; }
                    else if (idx === ansIdx) { style = "bg-red-50 border-red-200 text-red-800 line-through"; icon = "❌"; }
                    return `<div class="p-2.5 rounded-lg border text-xs flex justify-between items-center ${style}">${o} <span>${icon}</span></div>`;
                }).join('');

                cont.innerHTML += `
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm text-sm shrink-0">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-slate-400 text-xs">Q${i+1}</span>
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded border ${statusClass}">${statusText}</span>
                    </div>
                    <p class="font-bold text-slate-800 mb-1 leading-relaxed">${q.q}</p>
                    <p class="text-[10px] text-slate-400 font-mono mb-3">${q.tag}</p>
                    <div class="space-y-1.5 mb-3">${optsHtml}</div>
                    <div class="mt-2 text-xs text-yellow-800 bg-yellow-50 border border-yellow-200 p-2.5 rounded-lg leading-relaxed flex gap-2">
                        <span>💡</span>
                        <span>${q.why}</span>
                    </div>
                </div>`;
            });
        }

        function closeReview() {
            views.review.classList.replace('flex', 'hidden');
            previousView.classList.remove('hidden');
            if(previousView === views.result) previousView.classList.add('flex');
        }

        function resetApp() {
            clearInterval(timerId);
            document.getElementById('username').value = "";
            views.result.classList.replace('flex', 'hidden');
            views.start.classList.remove('hidden');
            document.getElementById('header').classList.add('hidden');
        }
    </script>
</body>
</html>
